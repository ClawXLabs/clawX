# ClawX Phase 5 — VPC + RDS + ElastiCache + ECS Fargate + ALB
# Region default: ap-south-1 (override with --region)
AWSTemplateFormatVersion: '2010-09-09'
Description: ClawX production stack (Next.js WS app, price-fetcher, keeper, agent scheduler/workers)

Parameters:
  ProjectName:
    Type: String
    Default: clawx
  EnvironmentName:
    Type: String
    Default: prod
  DbInstanceClass:
    Type: String
    Default: db.t3.micro
  RedisNodeType:
    Type: String
    Default: cache.t3.micro
  WebDesiredCount:
    Type: Number
    Default: 1
  WorkerDesiredCount:
    Type: Number
    Default: 2
  WorkerMaxCount:
    Type: Number
    Default: 8
  AdminDesiredCount:
    Type: Number
    Default: 1
  AdminHost:
    Type: String
    Default: admin.clawxlab.xyz
    Description: Host header routed to the admin ECS service
  ImageTag:
    Type: String
    Default: latest
  # Comma-separated secret ARN or leave empty to create a placeholder secret
  CreatePlaceholderSecret:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']

Conditions:
  CreateSecret: !Equals [!Ref CreatePlaceholderSecret, 'true']

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${EnvironmentName}-vpc'

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-igw'

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: 10.0.0.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-public-1'

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-public-2'

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: 10.0.10.0/24
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-private-1'

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: 10.0.11.0/24
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-private-2'

  NatEip:
    Type: AWS::EC2::EIP
    DependsOn: AttachGateway
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEip.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-nat'

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-public-rt'

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-private-rt'

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ClawX ALB
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-alb-sg'

  EcsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ClawX ECS tasks
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          SourceSecurityGroupId: !Ref AlbSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-ecs-sg'

  DbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ClawX RDS
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref EcsSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-db-sg'

  RedisSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ClawX Redis
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          SourceSecurityGroupId: !Ref EcsSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-redis-sg'

  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: ClawX Postgres subnets
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2

  DbMasterSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${ProjectName}/${EnvironmentName}/db-master'
      GenerateSecretString:
        SecretStringTemplate: '{"username":"clawx"}'
        GenerateStringKey: password
        PasswordLength: 32
        ExcludeCharacters: '"@/\'

  Database:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub '${ProjectName}-${EnvironmentName}'
      Engine: postgres
      EngineVersion: '16'
      DBInstanceClass: !Ref DbInstanceClass
      AllocatedStorage: 20
      StorageType: gp2
      MasterUsername: !Sub '{{resolve:secretsmanager:${DbMasterSecret}:SecretString:username}}'
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${DbMasterSecret}:SecretString:password}}'
      DBName: clawx
      DBSubnetGroupName: !Ref DbSubnetGroup
      VPCSecurityGroups:
        - !Ref DbSecurityGroup
      PubliclyAccessible: false
      BackupRetentionPeriod: 0
      MultiAZ: false
      StorageEncrypted: false
      DeletionProtection: false

  RedisSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: ClawX Redis
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2

  RedisCluster:
    Type: AWS::ElastiCache::CacheCluster
    Properties:
      ClusterName: !Sub '${ProjectName}-${EnvironmentName}'
      Engine: redis
      CacheNodeType: !Ref RedisNodeType
      NumCacheNodes: 1
      Port: 6379
      VpcSecurityGroupIds:
        - !Ref RedisSecurityGroup
      CacheSubnetGroupName: !Ref RedisSubnetGroup
      TransitEncryptionEnabled: false
      AutoMinorVersionUpgrade: true

  AppSecret:
    Type: AWS::SecretsManager::Secret
    Condition: CreateSecret
    Properties:
      Name: !Sub '${ProjectName}/${EnvironmentName}/app'
      Description: ClawX app env JSON — update after stack create with real keys
      SecretString: !Sub |
        {
          "SETTLEMENT_PRIVATE_KEY": "REPLACE_ME",
          "PRIVATE_KEY": "REPLACE_ME",
          "FUJI_RPC_URL": "https://api.avax-test.network/ext/bc/C/rpc",
          "NEXT_PUBLIC_FUJI_RPC_URL": "https://api.avax-test.network/ext/bc/C/rpc",
          "NEXT_PUBLIC_CONTRACT_ADDRESS": "REPLACE_ME",
          "NEXT_PUBLIC_COLLATERAL_TOKEN_ADDRESS": "REPLACE_ME",
          "NEXT_PUBLIC_TUSDC_ADDRESS": "REPLACE_ME",
          "NEXT_PUBLIC_TRADE_RELAY": "true",
          "FAST_ORACLE_ADDRESSES": "{}",
          "AGENT_RUNNER_SECRET": "REPLACE_ME",
          "AGENT_LLM_API_KEY": "",
          "AGENT_LLM_BASE_URL": "https://generativelanguage.googleapis.com/v1beta/openai",
          "AGENT_LLM_MODEL": "gemini-2.0-flash",
          "SETTINGS_ENCRYPTION_KEY": "REPLACE_ME",
          "APP_URL": "http://PLACEHOLDER",
          "NEXT_PUBLIC_WS_URL": "wss://PLACEHOLDER/ws",
          "DATABASE_SSL": "true",
          "DATABASE_SSL_REJECT_UNAUTHORIZED": "false",
          "REDIS_TLS": "false",
          "PRICE_FETCH_INTERVAL_MS": "3000",
          "AGENT_QUEUE_NAME": "agent-tick",
          "AGENT_SCHEDULER_INTERVAL_MS": "10000",
          "AGENT_WORKER_CONCURRENCY": "5"
        }

  EcrWeb:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub '${ProjectName}/web'
      ImageScanningConfiguration:
        ScanOnPush: true

  EcrPriceFetcher:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub '${ProjectName}/price-fetcher'
      ImageScanningConfiguration:
        ScanOnPush: true

  EcrKeeper:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub '${ProjectName}/keeper'
      ImageScanningConfiguration:
        ScanOnPush: true

  EcrScheduler:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub '${ProjectName}/agent-scheduler'
      ImageScanningConfiguration:
        ScanOnPush: true

  EcrWorker:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub '${ProjectName}/agent-worker'
      ImageScanningConfiguration:
        ScanOnPush: true

  EcrAdmin:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub '${ProjectName}/admin'
      ImageScanningConfiguration:
        ScanOnPush: true

  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub '${ProjectName}-${EnvironmentName}'
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  LogGroupWeb:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/${ProjectName}/web'
      RetentionInDays: 14

  LogGroupPrice:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/${ProjectName}/price-fetcher'
      RetentionInDays: 14

  LogGroupKeeper:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/${ProjectName}/keeper'
      RetentionInDays: 14

  LogGroupScheduler:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/${ProjectName}/agent-scheduler'
      RetentionInDays: 14

  LogGroupWorker:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/${ProjectName}/agent-worker'
      RetentionInDays: 14

  LogGroupAdmin:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/${ProjectName}/admin'
      RetentionInDays: 14

  AdminSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${ProjectName}/${EnvironmentName}/admin'
      Description: ClawX admin desk env (narrow — no settlement keys). Filled by sync-admin-task-env.js
      SecretString: !Sub |
        {
          "ADMIN_SESSION_SECRET": "REPLACE_ME",
          "DATABASE_SSL": "true",
          "DATABASE_SSL_REJECT_UNAUTHORIZED": "false",
          "ADMIN_HOST": "${AdminHost}"
        }

  EcsExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-${EnvironmentName}-ecs-exec'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: secrets
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref DbMasterSecret
                  - !Ref AdminSecret
                  - !If [CreateSecret, !Ref AppSecret, !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}/*']

  EcsTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-${EnvironmentName}-ecs-task'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole

  Alb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${ProjectName}-${EnvironmentName}'
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref AlbSecurityGroup

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${ProjectName}-web'
      Port: 3000
      Protocol: HTTP
      VpcId: !Ref VPC
      TargetType: ip
      HealthCheckPath: /api/health
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: 200
      TargetGroupAttributes:
        - Key: stickiness.enabled
          Value: 'true'
        - Key: stickiness.type
          Value: lb_cookie
        - Key: stickiness.lb_cookie.duration_seconds
          Value: '86400'
        - Key: deregistration_delay.timeout_seconds
          Value: '30'

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref Alb
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  TargetGroupAdmin:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${ProjectName}-admin'
      Port: 3000
      Protocol: HTTP
      VpcId: !Ref VPC
      TargetType: ip
      HealthCheckPath: /api/health
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: 200
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: '30'

  HttpListenerRuleAdmin:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref HttpListener
      Priority: 10
      Conditions:
        - Field: host-header
          Values:
            - !Ref AdminHost
      Actions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroupAdmin

  # Shared env helpers as CloudFormation intrinsic composition is limited —
  # DATABASE_URL / REDIS_URL / APP_URL are injected by deploy script into task defs.
  # Base task definition uses ECR images + secrets from AppSecret for app keys.

  TaskWeb:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${ProjectName}-web'
      Cpu: '1024'
      Memory: '2048'
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt EcsExecutionRole.Arn
      TaskRoleArn: !GetAtt EcsTaskRole.Arn
      ContainerDefinitions:
        - Name: web
          Image: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ProjectName}/web:${ImageTag}'
          Essential: true
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroupWeb
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: web
          Environment:
            - Name: NODE_ENV
              Value: production
            - Name: PORT
              Value: '3000'
            - Name: HOST
              Value: 0.0.0.0

  TaskPriceFetcher:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${ProjectName}-price-fetcher'
      Cpu: '256'
      Memory: '512'
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt EcsExecutionRole.Arn
      TaskRoleArn: !GetAtt EcsTaskRole.Arn
      ContainerDefinitions:
        - Name: price-fetcher
          Image: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ProjectName}/price-fetcher:${ImageTag}'
          Essential: true
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroupPrice
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: price
          Environment:
            - Name: NODE_ENV
              Value: production

  TaskKeeper:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${ProjectName}-keeper'
      Cpu: '512'
      Memory: '1024'
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt EcsExecutionRole.Arn
      TaskRoleArn: !GetAtt EcsTaskRole.Arn
      ContainerDefinitions:
        - Name: keeper
          Image: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ProjectName}/keeper:${ImageTag}'
          Essential: true
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroupKeeper
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: keeper
          Environment:
            - Name: NODE_ENV
              Value: production

  TaskScheduler:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${ProjectName}-agent-scheduler'
      Cpu: '256'
      Memory: '512'
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt EcsExecutionRole.Arn
      TaskRoleArn: !GetAtt EcsTaskRole.Arn
      ContainerDefinitions:
        - Name: agent-scheduler
          Image: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ProjectName}/agent-scheduler:${ImageTag}'
          Essential: true
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroupScheduler
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: scheduler
          Environment:
            - Name: NODE_ENV
              Value: production

  TaskWorker:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${ProjectName}-agent-worker'
      Cpu: '512'
      Memory: '1024'
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt EcsExecutionRole.Arn
      TaskRoleArn: !GetAtt EcsTaskRole.Arn
      ContainerDefinitions:
        - Name: agent-worker
          Image: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ProjectName}/agent-worker:${ImageTag}'
          Essential: true
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroupWorker
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: worker
          Environment:
            - Name: NODE_ENV
              Value: production

  TaskAdmin:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${ProjectName}-admin'
      Cpu: '512'
      Memory: '1024'
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt EcsExecutionRole.Arn
      TaskRoleArn: !GetAtt EcsTaskRole.Arn
      ContainerDefinitions:
        - Name: admin
          Image: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ProjectName}/admin:${ImageTag}'
          Essential: true
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroupAdmin
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: admin
          Environment:
            - Name: NODE_ENV
              Value: production
            - Name: PORT
              Value: '3000'
            - Name: HOST
              Value: 0.0.0.0

  ServiceWeb:
    Type: AWS::ECS::Service
    DependsOn: HttpListener
    Properties:
      ServiceName: web
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref TaskWeb
      DesiredCount: !Ref WebDesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref PrivateSubnet1
            - !Ref PrivateSubnet2
          SecurityGroups:
            - !Ref EcsSecurityGroup
      LoadBalancers:
        - ContainerName: web
          ContainerPort: 3000
          TargetGroupArn: !Ref TargetGroup
      HealthCheckGracePeriodSeconds: 60
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 50

  ServiceAdmin:
    Type: AWS::ECS::Service
    DependsOn:
      - HttpListener
      - HttpListenerRuleAdmin
    Properties:
      ServiceName: admin
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref TaskAdmin
      DesiredCount: !Ref AdminDesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref PrivateSubnet1
            - !Ref PrivateSubnet2
          SecurityGroups:
            - !Ref EcsSecurityGroup
      LoadBalancers:
        - ContainerName: admin
          ContainerPort: 3000
          TargetGroupArn: !Ref TargetGroupAdmin
      HealthCheckGracePeriodSeconds: 90
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 50

  ServicePriceFetcher:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: price-fetcher
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref TaskPriceFetcher
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref PrivateSubnet1
            - !Ref PrivateSubnet2
          SecurityGroups:
            - !Ref EcsSecurityGroup
      DeploymentConfiguration:
        MaximumPercent: 100
        MinimumHealthyPercent: 0

  ServiceKeeper:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: keeper
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref TaskKeeper
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref PrivateSubnet1
            - !Ref PrivateSubnet2
          SecurityGroups:
            - !Ref EcsSecurityGroup
      DeploymentConfiguration:
        MaximumPercent: 100
        MinimumHealthyPercent: 0

  ServiceScheduler:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: agent-scheduler
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref TaskScheduler
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref PrivateSubnet1
            - !Ref PrivateSubnet2
          SecurityGroups:
            - !Ref EcsSecurityGroup
      DeploymentConfiguration:
        MaximumPercent: 100
        MinimumHealthyPercent: 0

  ServiceWorker:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: agent-workers
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref TaskWorker
      DesiredCount: !Ref WorkerDesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref PrivateSubnet1
            - !Ref PrivateSubnet2
          SecurityGroups:
            - !Ref EcsSecurityGroup
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 50
      # Auto-scaling (CPU target tracking) is attached by deploy.sh after
      # ensuring the ECS Application Auto Scaling service-linked role exists.

Outputs:
  VpcId:
    Value: !Ref VPC
  AlbDnsName:
    Value: !GetAtt Alb.DNSName
    Description: Point DNS here (or open http://<this>/ for smoke test)
  AlbUrl:
    Value: !Sub 'http://${Alb.DNSName}'
  ClusterName:
    Value: !Ref EcsCluster
  DbEndpoint:
    Value: !GetAtt Database.Endpoint.Address
  DbPort:
