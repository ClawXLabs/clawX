name: Deploy ClawX to ECS

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'pages/**'
      - 'components/**'
      - 'contexts/**'
      - 'hooks/**'
      - 'utils/**'
      - 'scripts/**'
      - 'db/**'
      - 'server.js'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.js'
      - 'deploy/docker/**'
      - 'deploy/aws/ecs/**'
      - '.github/workflows/deploy-ecs.yml'

env:
  AWS_REGION: ap-south-1
  PROJECT_NAME: clawx
  IMAGE_TAG: ${{ github.sha }}
  APP_SMOKE_URL: https://app.clawxlab.xyz

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push images
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          NEXT_PUBLIC_CONTRACT_ADDRESS: ${{ vars.NEXT_PUBLIC_CONTRACT_ADDRESS }}
          NEXT_PUBLIC_TUSDC_ADDRESS: ${{ vars.NEXT_PUBLIC_TUSDC_ADDRESS }}
          NEXT_PUBLIC_COLLATERAL_TOKEN_ADDRESS: ${{ vars.NEXT_PUBLIC_COLLATERAL_TOKEN_ADDRESS }}
          NEXT_PUBLIC_FUJI_RPC_URL: ${{ vars.NEXT_PUBLIC_FUJI_RPC_URL }}
          NEXT_PUBLIC_TRADE_RELAY: ${{ vars.NEXT_PUBLIC_TRADE_RELAY }}
          NEXT_PUBLIC_WS_URL: ${{ vars.NEXT_PUBLIC_WS_URL }}
          NEXT_PUBLIC_CHAIN_ID: ${{ vars.NEXT_PUBLIC_CHAIN_ID }}
        run: |
          set -euo pipefail
          for pair in \
            "web:deploy/docker/Dockerfile.web" \
            "price-fetcher:deploy/docker/Dockerfile.price-fetcher" \
            "keeper:deploy/docker/Dockerfile.keeper" \
            "agent-scheduler:deploy/docker/Dockerfile.agent-scheduler" \
            "agent-worker:deploy/docker/Dockerfile.agent-worker"
          do
            name="${pair%%:*}"
            file="${pair##*:}"
            image="$REGISTRY/$PROJECT_NAME/$name:$IMAGE_TAG"
            latest="$REGISTRY/$PROJECT_NAME/$name:latest"
            if [ "$name" = "web" ]; then
              docker build -f "$file" \
                --build-arg "NEXT_PUBLIC_CONTRACT_ADDRESS=${NEXT_PUBLIC_CONTRACT_ADDRESS:-}" \
                --build-arg "NEXT_PUBLIC_TUSDC_ADDRESS=${NEXT_PUBLIC_TUSDC_ADDRESS:-}" \
                --build-arg "NEXT_PUBLIC_COLLATERAL_TOKEN_ADDRESS=${NEXT_PUBLIC_COLLATERAL_TOKEN_ADDRESS:-}" \
                --build-arg "NEXT_PUBLIC_FUJI_RPC_URL=${NEXT_PUBLIC_FUJI_RPC_URL:-}" \
                --build-arg "NEXT_PUBLIC_TRADE_RELAY=${NEXT_PUBLIC_TRADE_RELAY:-true}" \
                --build-arg "NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-}" \
                --build-arg "NEXT_PUBLIC_CHAIN_ID=${NEXT_PUBLIC_CHAIN_ID:-43113}" \
                -t "$image" -t "$latest" .
            else
              docker build -f "$file" -t "$image" -t "$latest" .
            fi
            docker push "$image"
            docker push "$latest"
          done

      - name: Force ECS redeploy
        run: |
          CLUSTER="${PROJECT_NAME}-prod"
          for svc in web price-fetcher keeper agent-scheduler agent-workers; do
            aws ecs update-service \
              --cluster "$CLUSTER" \
              --service "$svc" \
              --force-new-deployment \
              --region "$AWS_REGION" >/dev/null
            echo "Redeployed $svc"
          done

      - name: Smoke health check
        run: |
          set -euo pipefail
          URL="${APP_SMOKE_URL}/api/health"
          echo "Waiting for $URL ..."
          for i in $(seq 1 24); do
            if curl -fsS --max-time 10 "$URL" | grep -q '"ok":true'; then
              echo "Smoke OK"
              curl -fsS --max-time 10 "$URL"
              exit 0
            fi
            echo "Attempt $i/24 — not ready yet"
            sleep 10
          done
          echo "Smoke check failed after ~4 minutes"
          exit 1
