services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clawx
      POSTGRES_USER: clawx
      POSTGRES_PASSWORD: clawx_local
    ports:
      - "5432:5432"
    volumes:
      - clawx_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawx -d clawx"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - clawx_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  clawx_postgres:
  clawx_redis:
